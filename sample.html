<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>動的フォーム生成</title>
    <style>
        .input-group {
            margin: 20px auto;
            max-width: 400px;
            text-align: left;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h3 style="text-align:center;">動的リンク設定</h3>

    <div class="input-group">
        <label>フォーム1 (送信先URL):</label>
        <input type="text" id="target-url" placeholder="https://l-tike.com/..." value="https://l-tike.com/st1/n3wg2bi2q34mp72y4d1d">
    </div>

    <div class="input-group">
        <label>フォーム2 (CERKの値):</label>
        <input type="text" id="target-value" placeholder="値を入力してください" value="a53b164c001d8e651e5bf50d92b077d4">
    </div>

    <hr>

    <form id="dynamic-form" action="" method="POST" rel="noreferrer" target="_blank">
        <p style="text-align: center;">
            <input type="submit" value="こちらからお申し込みください" style="display:inline-block; width:90%; max-width:400px; padding:14px; font-size:16px; background-color:#007bff; color:#fff; border:none; border-radius:6px; cursor:pointer;">
        </p>
        <input type="hidden" name="CERK" id="hidden-cerk" value="">
    </form>

    <script>
        const form = document.getElementById('dynamic-form');
        const urlInput = document.getElementById('target-url');
        const valInput = document.getElementById('target-value');
        const hiddenInput = document.getElementById('hidden-cerk');

        // ボタンが押された時に実行
        form.addEventListener('submit', function(event) {
            // 入力された値をaction属性にセット
            form.action = urlInput.value;
            
            // 入力された値をhidden項目のvalueにセット
            hiddenInput.value = valInput.value;

            // コンソールで確認（デバッグ用）
            console.log("送信先URL:", form.action);
            console.log("送信される値:", hiddenInput.value);
            
            // チェック: URLが空の場合は送信を止める
            if (!urlInput.value) {
                alert("URLを入力してください");
                event.preventDefault();
            }
        });
    </script>

</body>
</html>
